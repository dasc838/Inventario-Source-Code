<app-toolbar></app-toolbar>
<div class="main-div">
<mat-card class="example-card" style="text-align: center;">
  <mat-card-header class="cont">
    <mat-card-title>Ingreso de un articulo</mat-card-title>
    <mat-card-subtitle>Información para articulo nuevo</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
      <form [formGroup]="formGroupArt">
          <mat-form-field appearance="fill">
            <mat-label>Nombre del aritculo</mat-label>
            <input matInput type="text" formControlName="Nombre">
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Cantidad inicial</mat-label>
            <input matInput type="number" formControlName="Cantidad">
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Tipo de cantidad</mat-label>
            <mat-select formControlName="Tipo">
              <mat-option value="C">Unidades</mat-option>
              <mat-option value="P">Peso (Ingresar en cantidad inicial en libras)</mat-option>
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="fill" >
            <mat-label>Descripcion</mat-label>
            <textarea matInput formControlName="Descripcion"></textarea>
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Precio por unidad</mat-label>
            <input matInput type="number" formControlName="Preciounidad">
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Categoria</mat-label>
            <mat-select formControlName="Categoria" >
              <mat-option *ngFor="let categoria of categorias" value="{{categoria.Nombre}}">{{categoria.Nombre}}</mat-option>
            </mat-select>
          </mat-form-field>
          <button mat-raised-button (click)="newArt()" color="accent">
            Agregar articulo
            <mat-icon matSuffix>add_box</mat-icon>
          </button>
      </form>
    </mat-card-content>
</mat-card>
</div>
