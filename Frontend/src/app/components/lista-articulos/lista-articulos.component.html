<app-toolbar></app-toolbar>
<mat-form-field>
  <mat-label>Filter</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Buscar" #input>
</mat-form-field>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
  
    <!-- Position Column -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      <td mat-footer-cell *matFooterCellDef> Total </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripcion </th>
      <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>
  
    <!-- Weight Column -->
    <ng-container matColumnDef="categoria">
      <th mat-header-cell *matHeaderCellDef> Categoria </th>
      <td mat-cell *matCellDef="let element"> {{element.categoria}} </td>
      <td mat-footer-cell *matFooterCellDef> </td>
    </ng-container>
    
    <!-- <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef> Tipo </th>
        <td mat-cell *matCellDef="let element"> {{element.tipo}} </td>
        <td mat-footer-cell *matFooterCellDef></td>
    </ng-container> -->

    <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef> Precio individual </th>
        <td mat-cell *matCellDef="let element">Q. {{element.precio}} </td>
        <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef> Cantidad </th>
        <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
        <td mat-footer-cell *matFooterCellDef></td>
    </ng-container>

    <ng-container matColumnDef="costo">
      <th mat-header-cell *matHeaderCellDef> Costo total </th>
      <td mat-cell *matCellDef="let element">Q. {{element.costo}} </td>
      <td mat-footer-cell *matFooterCellDef> Q. {{obtenerCostoTotal()}} </td>
  </ng-container>

  <ng-container matColumnDef="agregar">
    <th mat-header-cell *matHeaderCellDef> Agregar</th>
    <td mat-cell *matCellDef="let element"> 
        <button mat-icon-button (click)="agregar(element)">
            <mat-icon>add_circle</mat-icon>
        </button> 
    </td>
    <td mat-footer-cell *matFooterCellDef></td>
  </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns" [ngClass]="{primary:true}"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr mat-footer-row *matFooterRowDef="displayedColumns"></tr>
  </table>
