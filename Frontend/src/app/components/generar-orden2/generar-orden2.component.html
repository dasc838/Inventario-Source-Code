<app-toolbar2></app-toolbar2>
<button mat-raised-button (click)="order()" [disabled]="disableOrder()" class="btn-center" color="accent">
    Generar orden
    <mat-icon matSuffix>add_box</mat-icon>
  </button>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->
  
    <!-- Position Column -->
    <ng-container matColumnDef="idarticulo">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.idarticulo}} </td>
    </ng-container>
    
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
    </ng-container>
  
    <!-- Name Column -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripcion </th>
      <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
    </ng-container>

    <ng-container matColumnDef="quitar">
        <th mat-header-cell *matHeaderCellDef> Quitar </th>
        <td mat-cell *matCellDef="let element"> 
            <button mat-icon-button [disabled]="quitarEnable(element.cantidadsel)" (click)="quitar(element)">
                <mat-icon>remove_circle</mat-icon>
            </button> 
        </td>
    </ng-container>

    <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef> Cantidad </th>
        <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
    </ng-container>

    <ng-container matColumnDef="agregar">
        <th mat-header-cell *matHeaderCellDef> Agregar</th>
        <td mat-cell *matCellDef="let element"> 
            <button mat-icon-button [disabled]="agregarEnable(element.cantidad)" (click)="agregar(element)">
                <mat-icon>add_circle</mat-icon>
            </button> 
        </td>
    </ng-container>

    <ng-container matColumnDef="cantidadsel">
        <th mat-header-cell *matHeaderCellDef> Cantidad seleccionada </th>
        <td mat-cell *matCellDef="let element"> {{element.cantidadsel}} </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
