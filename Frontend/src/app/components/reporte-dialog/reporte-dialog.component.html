<!-- Master Toggle Button -->
<table mat-table [dataSource]="dataSource" multiTemplateDataRows>

  <ng-container matColumnDef="categoria">
    <th mat-header-cell *matHeaderCellDef> Categoria </th>
    <td mat-cell *matCellDef="let element"> {{element.categoria}} </td>
  </ng-container>

  <ng-container matColumnDef="preciototal">
    <th mat-header-cell *matHeaderCellDef> Precio total </th>
    <td mat-cell *matCellDef="let element"> Q. {{element.preciototal}} </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let element">
      <a mat-button href="javascript:void()" (click)="element.isExpanded = !element.isExpanded">Ver resumen de la categoria</a>
    </td>
  </ng-container>


  <!-- Template for details row -->
  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let element" [attr.colspan]="displayedColumns.length">

      <div class="row student-element-detail" [@detailExpand]="element.isExpanded ? 'expanded' : 'collapsed'">
        <mat-list>
          <div mat-subheader>Articulos de {{element.categoria}}</div>
          <mat-divider></mat-divider>
          <mat-list-item *ngFor="let articulo of element.articulo">
            <div mat-line>Articulo: {{articulo.nombre}}</div>
            <div mat-line> {{articulo.tipo}}: {{articulo.cantidad}} {{articulo.dimension}}| Por un total de: Q. {{articulo.precioind}}
              <mat-divider></mat-divider>
            </div>
            
          </mat-list-item>
          
        </mat-list>
      </div>

    </td>
  </ng-container>


  <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
  <tr mat-row *matRowDef="let element; columns: displayedColumns;" class="student-element-row"
    [class.student-expanded-row]="element.isExpanded"></tr>

  <!-- Extra row to show detail content column -->
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="student-detail-row"></tr>

</table>
