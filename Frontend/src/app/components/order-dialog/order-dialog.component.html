<h1 mat-dialog-title>Confirmacion de orden</h1>
<div mat-dialog-content>
    <mat-list role="list" *ngFor="let element of dataSource">
        <mat-list-item role="listitem" >{{element.cantidad}} {{element.tipo}} del articulo {{element.nombre}} por Q.{{element.preciototal}}</mat-list-item>
        <mat-divider></mat-divider>
        <!-- <mat-list-item role="listitem">Item 2</mat-list-item> -->
      </mat-list>
      <mat-list role="list">
        <mat-list-item role="listitem" >Total de Q.{{PrecioTotal}}</mat-list-item>
        <mat-divider></mat-divider>
        <!-- <mat-list-item role="listitem">Item 2</mat-list-item> -->
      </mat-list>
</div>
<div mat-dialog-actions>
  <button mat-button mat-dialog-close color="primary">Cancelar</button>
  <button mat-button (click)="confirmar()" color="accent">Confirmar</button>
</div>
