<div class="main-div">
  <mat-card class="example-card" style="text-align: center;">
    <mat-card-header class="cont">
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form [formGroup]="formGroupUser" >
            <mat-form-field appearance="fill">
              <mat-label>Usuario</mat-label>
              <input matInput type="text" formControlName="Nombre">
            </mat-form-field>
            <mat-form-field appearance="fill">
              <mat-label>Contraseña</mat-label>
              <input matInput type="password" formControlName="Contrasenia">
            </mat-form-field >
            <br>
            <button  mat-raised-button (click)="login()" color="accent">
              Ingresar
              <mat-icon matSuffix>login</mat-icon>
            </button>
        </form>
      </mat-card-content>
  </mat-card>
</div>
